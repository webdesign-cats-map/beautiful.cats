<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>校园流浪猫 · 地图系统</title>
  <script>
    window.AMAP_KEY = 'd134197facab2e34ff71980d8d2371e0';
    window.TDT_KEY  = '5bfbb275a4ae2d36cc19e3f8551bae26';
  </script>
  <script src="https://webapi.amap.com/maps?v=2.0&key=d134197facab2e34ff71980d8d2371e0&plugin=AMap.HeatMap,AMap.Geolocation,AMap.InfoWindow,AMap.TileLayer,AMap.TileLayer.Satellite,AMap.TileLayer.RoadNet,AMap.PlaceSearch,AMap.Circle"></script>
  <link rel="stylesheet" href="css/style.css">
  <style>
    html,body{height:100%;margin:0;padding:0;}
    .main-layout{height:calc(100vh - var(--navbar-h));}
  </style>
</head>
<body>

<header class="navbar">
  <div class="navbar-left">
    <div class="logo">
      <div class="logo-icon">🐱</div>
      河海校园猫咪地图
    </div>
    <nav class="nav-links">
      <a href="index.html" class="active">🗺️ 地图</a>
      <a href="pages/cats.html">🐾 猫咪档案</a>
      <a href="pages/checkin.html">📸 打卡上报</a>
      <a href="pages/stats.html">📊 数据看板</a>
    </nav>
  </div>
  <div class="navbar-right" id="navUser"></div>
</header>

<div class="main-layout" style="display:flex;">

  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h3>🎛️ 地图控制</h3>
      <button class="btn btn-sm" id="btnToggleSidebar" title="收起">◀</button>
    </div>

    <div class="sidebar-section">
      <h4>👁️ 图层显示</h4>
      <label class="switch-label"><input type="checkbox" id="chkCatMarkers" checked> 🐱 猫咪点位</label>
      <label class="switch-label"><input type="checkbox" id="chkHeatmap"> 🔥 活动热力图</label>
      <p style="font-size:11px;color:var(--text-3);padding:0 8px;margin-top:-4px">新增猫咪/打卡后自动更新</p>
    </div>

    <div class="sidebar-section">
      <h4>🔽 筛选条件</h4>
      <select id="filterGender" class="form-select">
        <option value="">全部性别</option>
        <option value="male">♂ 公猫</option>
        <option value="female">♀ 母猫</option>
      </select>
      <select id="filterHealth" class="form-select mt-4">
        <option value="">全部状态</option>
        <option value="healthy">✅ 健康</option>
        <option value="injured">🏥 需关注</option>
      </select>
      <button class="btn btn-primary btn-block mt-8" id="btnFilter">应用筛选</button>
    </div>

    <div class="sidebar-section">
      <h4>🔍 搜索猫咪</h4>
      <div class="input-group">
        <input type="text" id="searchInput" class="form-input" placeholder="名字、毛色、性格...">
        <button class="btn btn-primary" id="btnSearch">搜</button>
      </div>
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="sidebar-section">
      <h4>⚡ 快速操作</h4>
      <button class="btn btn-success btn-block" id="btnLocate">📍 定位我的位置</button>
      <button class="btn btn-warning btn-block" id="btnReport">📢 上报新猫咪</button>
    </div>

    <div class="sidebar-section">
      <h4>📈 实时统计</h4>
      <div class="stat-mini"><span>校园猫咪</span><strong id="statTotal">-</strong></div>
      <div class="stat-mini"><span>今日打卡</span><strong id="statToday">-</strong></div>
    </div>
  </aside>

  <!-- 地图 -->
  <div class="map-container">
    <div id="mapLoading" class="map-loading">
      <div class="spinner"></div>
      <p>🐾 地图加载中，请稍候...</p>
    </div>
    <div id="mapContainer" style="width:100%;height:100%;"></div>
    <!-- 鼠标坐标显示 -->
    <div class="coord-bar" id="coordBar" style="display:none"></div>
    <!-- 底图切换 -->
    <div id="basemapPanel">
      <div class="bm-title">🗺️ 切换底图</div>
      <div id="basemapSwitcher"></div>
    </div>
  </div>
</div>

<!-- 猫咪信息弹窗 -->
<div class="modal-overlay" id="catModal" style="display:none">
  <div class="modal cat-modal">
    <button class="modal-close" id="closeCatModal">✕</button>
    <div class="cat-modal-header">
      <div class="cat-avatar-large" id="modalAvatar">🐱</div>
      <div class="cat-modal-info">
        <h2 id="modalName">-</h2>
        <div id="modalTags" class="tag-group"></div>
        <p id="modalLocation" class="text-muted" style="font-size:12px;margin-top:4px">📍 -</p>
      </div>
    </div>
    <div class="info-grid">
      <div class="info-item"><label>性别</label><span id="modalGender">-</span></div>
      <div class="info-item"><label>毛色</label><span id="modalColor">-</span></div>
      <div class="info-item"><label>健康状态</label><span id="modalHealth">-</span></div>
      <div class="info-item"><label>绝育状态</label><span id="modalNeutered">-</span></div>
      <div class="info-item"><label>打卡次数</label><span id="modalCheckins">-</span></div>
      <div class="info-item"><label>最近出没</label><span id="modalLastSeen">-</span></div>
    </div>
    <div class="info-desc" style="margin-top:8px">
      <label>简介</label><p id="modalDesc">-</p>
    </div>
    <div class="cat-modal-footer">
      <button class="btn btn-primary" id="btnCheckinFromModal">📸 打卡</button>
      <button class="btn btn-outline" id="btnFavoriteFromModal">❤️ 收藏</button>
      <a id="btnDetailFromModal" href="#" class="btn btn-outline">详情 →</a>
    </div>
  </div>
</div>

<!-- 上报弹窗 -->
<div class="modal-overlay" id="reportModal" style="display:none">
  <div class="modal">
    <button class="modal-close" id="closeReportModal">✕</button>
    <div class="modal-title">📢 上报新猫咪</div>
    <p style="font-size:13px;color:var(--text-3);margin-bottom:14px">点击地图选择猫咪出没位置，填写信息后提交，管理员审核通过后将自动添加到地图</p>
    <div class="form-group">
      <label>🐱 猫咪名字（可选）</label>
      <input type="text" id="reportCatName" class="form-input" placeholder="给它起个名字吧~">
    </div>
    <div class="form-group">
      <label>📍 选择位置 <span style="color:var(--red)">*</span></label>
      <div class="location-picker">
        <span id="reportLocationText">请点击地图选点</span>
        <button class="btn btn-sm btn-outline" id="btnPickLocation">🎯 选点</button>
      </div>
    </div>
    <div class="form-group">
      <label>📝 描述特征</label>
      <textarea id="reportDesc" class="form-input" rows="3" placeholder="毛色、体型、性格、发现地点的详细描述..."></textarea>
    </div>
    <div class="form-actions">
      <button class="btn btn-primary" id="btnSubmitReport">🐾 提交上报</button>
      <button class="btn btn-outline" id="btnCancelReport">取消</button>
    </div>
  </div>
</div>

<script src="js/db.js"></script>
<script src="js/map.js"></script>
<script src="js/auth.js"></script>
<script>
  if (!DB.Session.isLoggedIn()) {
    window.location.replace('pages/login.html');
  } else {
    Auth.updateNav();
    MapApp.init();
  }
</script>
</body>
</html>
